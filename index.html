<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三川工方｜工程管理系統</title>
<style>
:root {
  --bg:      #0D1117;
  --sb:      #131920;
  --card:    #1A2230;
  --card2:   #1E2840;
  --border:  #243040;
  --border2: #2E3D52;
  --gold:    #C9A84C;
  --gold2:   #E8C97A;
  --gold-bg: rgba(201,168,76,0.08);
  --text:    #E8EDF5;
  --muted:   #4A5E78;
  --muted2:  #6A7E98;
  --green:   #4AB87A;
  --red:     #D05050;
  --blue:    #4A8CD0;
  --font:    'PingFang TC','Noto Sans TC','Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

/* ══ LAYOUT ══ */
.app{display:flex;height:100dvh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
width:200px;min-width:200px;
background:var(–sb);
border-right:1px solid var(–border);
display:flex;flex-direction:column;
transition:width 0.22s cubic-bezier(.4,0,.2,1);
overflow:visible;flex-shrink:0;
position:relative;
}
.sidebar.collapsed{width:52px;min-width:52px}

.sb-logo{
padding:14px 12px 12px;
border-bottom:1px solid var(–border);
display:flex;align-items:center;
min-height:56px;
}
.sb-logo-text{overflow:hidden;white-space:nowrap}
.sb-title{font-size:13px;font-weight:800;color:var(–gold);letter-spacing:1px}
.sb-sub{font-size:9px;color:var(–muted2);margin-top:2px;letter-spacing:0.5px}

/* 收合鍵：固定在側欄右邊緣垂直正中央 */
.sb-toggle{
position:absolute;
right:-12px;
top:50%;
transform:translateY(-50%);
z-index:100;
width:24px;height:40px;
background:var(–sb);
border:1px solid var(–border);
border-left:none;
border-radius:0 8px 8px 0;
cursor:pointer;
display:flex;align-items:center;justify-content:center;
color:var(–muted);
transition:color 0.15s, background 0.15s;
padding:0;
}
.sb-toggle:hover{color:var(–gold);background:var(–card)}
.sidebar{position:relative}

.sb-nav{padding:4px 6px;overflow-y:auto;display:flex;flex-direction:column;gap:1px;flex:1}
.sb-nav::-webkit-scrollbar{display:none}
.sb-bottom{border-top:1px solid var(–border);padding:8px 6px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.sb-new-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(–gold);border:none;border-radius:8px;cursor:pointer;color:#000;padding:10px 12px;font-size:12px;font-weight:700;font-family:var(–font);transition:all 0.15s}
.sb-new-btn svg{stroke:#000}
.sb-new-btn:hover{background:#e0ba5c;transform:translateY(-1px)}
.sidebar.collapsed .sb-new-btn .nav-label{display:none}
.sb-stats-inline{display:flex;align-items:center;gap:5px;padding:3px 6px;font-size:11px}
.sb-stats-inline .stat-l{color:var(–muted2)}
.sb-stats-inline .stat-v{color:var(–gold);font-weight:700}
.sidebar.collapsed .sb-stats-inline .stat-l{display:none}
.sidebar.collapsed .sb-stats-inline{justify-content:center}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{font-size:9px;color:var(–muted);padding:10px 8px 3px;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.sidebar.collapsed .sb-section{display:none}
.sb-divider{border-top:1px solid var(–border);margin:6px 8px}

.nav-item{
display:flex;align-items:center;gap:9px;
width:100%;border:none;border-radius:7px;cursor:pointer;
padding:8px 9px;font-size:12.5px;font-family:var(–font);
background:transparent;color:var(–muted2);
transition:all 0.13s;position:relative;white-space:nowrap;
overflow:hidden;text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(–text)}
.nav-item.active{background:var(–gold-bg);color:var(–gold);font-weight:600}
.nav-item .active-bar{
position:absolute;left:0;top:20%;bottom:20%;
width:3px;border-radius:2px;background:var(–gold);
display:none;
}
.nav-item.active .active-bar{display:none}

/* ── 幾何圖示：正方形 → 旋轉45度菱形 ── */
.nav-icon{
width:26px;height:26px;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
}
.nav-icon-box{
width:14px;height:14px;
border-radius:2px;
transition:transform 0.28s cubic-bezier(.34,1.4,.64,1),
box-shadow 0.22s;
transform:rotate(0deg);
position:relative;
/* 純色填滿，靠 background 顏色區分 */
}
/* 選中：旋轉45度成菱形，右頂角指向內容區 */
.nav-item.active .nav-icon-box{
transform:rotate(45deg);
border-radius:1px;
}
.nav-item.active .nav-icon-box span{
transform:rotate(-45deg);
}
.nav-icon-box span{
display:flex;align-items:center;justify-content:center;
transition:transform 0.30s cubic-bezier(.34,1.4,.64,1);
transform:rotate(0deg);
}

.nav-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .nav-label{display:none}
.nav-badge{
font-size:9px;padding:1px 5px;border-radius:8px;
font-weight:700;min-width:16px;text-align:center;
flex-shrink:0;
}
.sidebar.collapsed .nav-badge{display:none}
.nav-dot{
position:absolute;right:7px;top:8px;
width:5px;height:5px;border-radius:50%;
display:none;
}
.sidebar.collapsed .nav-dot{display:block}

.stat-l{color:var(–muted2)}
.stat-v{color:var(–gold);font-weight:700}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

.topbar{
display:flex;align-items:center;justify-content:space-between;
padding:0 24px;height:56px;
border-bottom:1px solid var(–border);
background:var(–sb);flex-shrink:0;
}
.topbar-left{display:flex;flex-direction:column;gap:2px}
.topbar-title{font-size:15px;font-weight:800;letter-spacing:0.5px}
.topbar-sub{font-size:11px;color:var(–muted2)}
.topbar-right{display:flex;align-items:center;gap:10px}
.online-dot{
width:7px;height:7px;border-radius:50%;background:var(–green);
box-shadow:0 0 6px var(–green);display:inline-block;
}
.online-label{font-size:11px;color:var(–green)}

.content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* ══ CHAT PANEL ══ */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.messages{
flex:1;overflow-y:auto;
padding:20px 24px 12px;
display:flex;flex-direction:column;gap:16px;
}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}

.msg-row{display:flex;align-items:flex-start;gap:10px}
.msg-row.user{justify-content:flex-end}
.avatar{
width:28px;height:28px;border-radius:8px;
background:linear-gradient(135deg,var(–gold),#A07020);
color:#fff;font-size:9px;font-weight:800;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;margin-top:2px;letter-spacing:0.5px;
}
.bubble{
padding:10px 14px;border-radius:12px;
font-size:13.5px;line-height:1.65;word-break:break-word;
max-width:72%;
}
.bubble.ai{background:var(–card);border:1px solid var(–border);color:var(–text)}
.bubble.user{background:linear-gradient(135deg,#8A5A1A,var(–gold));color:#fff}

.parsed-card{
background:var(–card);border:1px solid var(–border);
border-left:3px solid;border-radius:10px;overflow:hidden;
max-width:72%;margin-left:38px;
}
.parsed-head{
display:flex;justify-content:space-between;align-items:center;
padding:7px 12px;border-bottom:1px solid var(–border);
}
.parsed-tag{
font-size:10px;padding:2px 8px;border-radius:5px;
font-weight:700;
}
.parsed-conf{font-size:10px;color:var(–muted2)}
.parsed-table{width:100%;border-collapse:collapse}
.parsed-table td{
padding:5px 12px;font-size:12px;
border-bottom:1px solid var(–border);
}
.parsed-table td:first-child{color:var(–muted2);width:60px;white-space:nowrap}
.parsed-table td:last-child{color:var(–text);border-bottom:none}
.parsed-table tr:last-child td{border-bottom:none}
.parsed-saved{
padding:6px 12px;font-size:11px;color:var(–green);
border-top:1px solid var(–border);display:flex;align-items:center;gap:5px;
}

.typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing-dots span{
width:6px;height:6px;border-radius:50%;background:var(–muted);
animation:blink 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* Input */
.input-area{
padding:10px 24px 16px;
border-top:1px solid var(–border);
background:var(–sb);flex-shrink:0;
}
.attach-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.attach-thumb{
width:50px;height:50px;object-fit:cover;
border-radius:7px;border:1px solid var(–border);
}
.attach-file{
background:var(–card);border:1px solid var(–border);
border-radius:6px;padding:4px 8px;font-size:11px;
color:var(–muted2);max-width:100px;overflow:hidden;
text-overflow:ellipsis;white-space:nowrap;
}
.attach-wrap{position:relative;display:inline-flex}
.attach-x{
position:absolute;top:-4px;right:-4px;
width:14px;height:14px;border-radius:50%;
background:#922;border:none;color:#fff;
cursor:pointer;font-size:8px;
display:flex;align-items:center;justify-content:center;
}
.input-box{
background:var(–card);border:1px solid var(–border2);
border-radius:12px;overflow:hidden;
transition:border-color 0.15s;
}
.input-box:focus-within{border-color:rgba(201,168,76,0.4)}
.input-textarea{
width:100%;background:transparent;border:none;
color:var(–text);padding:12px 15px;font-size:13.5px;
resize:none;outline:none;line-height:1.6;
font-family:var(–font);display:block;
}
.input-textarea::placeholder{color:var(–muted)}
.input-footer{
display:flex;justify-content:space-between;align-items:center;
padding:7px 12px;border-top:1px solid var(–border);
}
.input-hint{font-size:11px;color:var(–muted)}
.input-btns{display:flex;gap:6px;align-items:center}
.icon-btn{
background:transparent;border:none;cursor:pointer;
color:var(–muted);display:flex;align-items:center;
padding:5px 7px;border-radius:7px;transition:all 0.13s;
}
.icon-btn:hover{background:var(–card2);color:var(–text)}
.icon-btn svg{width:16px;height:16px}
.send-btn{
background:linear-gradient(135deg,#A07020,var(–gold));
border:none;border-radius:8px;color:#fff;cursor:pointer;
padding:8px 12px;display:flex;align-items:center;
transition:opacity 0.13s;
}
.send-btn:disabled{opacity:0.45;cursor:default}
.send-btn svg{width:15px;height:15px}

/* ══ DATA PANEL ══ */
.data-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}

.data-topbar{
display:flex;justify-content:space-between;align-items:center;
padding:0 24px;height:56px;
border-bottom:1px solid var(–border);
background:var(–sb);flex-shrink:0;
}
.data-title-row{display:flex;align-items:center;gap:10px}
.data-mod-icon{
width:40px;height:40px;border-radius:11px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
}
.data-mod-icon svg{width:26px;height:26px}
.data-title{font-size:15px;font-weight:800}
.data-count{font-size:11px;color:var(–muted2);margin-top:1px}
.search-input{
background:var(–card);border:1px solid var(–border2);
border-radius:9px;color:var(–text);padding:7px 13px;
font-size:13px;outline:none;width:180px;font-family:var(–font);
transition:border-color 0.15s;
}
.search-input:focus{border-color:rgba(201,168,76,0.4)}
.search-input::placeholder{color:var(–muted)}

/* AI quick input in data panel */
.data-ai-bar{
padding:10px 24px;border-bottom:1px solid var(–border);
background:rgba(201,168,76,0.03);flex-shrink:0;
display:flex;gap:8px;align-items:center;
}
.data-ai-input{
flex:1;background:var(–card);border:1px solid var(–border2);
border-radius:9px;color:var(–text);padding:8px 13px;
font-size:13px;outline:none;font-family:var(–font);
transition:border-color 0.15s;
}
.data-ai-input:focus{border-color:rgba(201,168,76,0.4)}
.data-ai-input::placeholder{color:var(–muted)}
.data-ai-btn{
background:var(–gold);border:none;border-radius:8px;
color:#1A1000;font-size:11px;font-weight:800;
cursor:pointer;padding:8px 14px;white-space:nowrap;
font-family:var(–font);letter-spacing:0.5px;
transition:opacity 0.13s;
}
.data-ai-btn:disabled{opacity:0.5;cursor:default}

/* Table */
.table-area{flex:1;overflow:auto;padding:16px 24px 20px}
.table-area::-webkit-scrollbar{width:4px;height:4px}
.table-area::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}

.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{
padding:8px 14px;background:var(–card2);
border:1px solid var(–border);
color:var(–muted2);font-weight:700;
font-size:10px;letter-spacing:1px;
text-transform:uppercase;white-space:nowrap;text-align:left;
position:sticky;top:0;z-index:2;
}
.data-table td{
padding:10px 14px;border:1px solid var(–border);
color:var(–text);vertical-align:middle;
line-height:1.4;
}
.data-table tr:hover td{background:rgba(255,255,255,0.02)}
.del-cell{text-align:center;width:36px}
.del-row-btn{
background:none;border:none;color:var(–muted);
cursor:pointer;font-size:14px;padding:2px 4px;
transition:color 0.13s;
}
.del-row-btn:hover{color:var(–red)}

/* Manual add form */
.add-form-bar{
border-top:1px solid var(–border);
padding:12px 24px;background:var(–sb);flex-shrink:0;
}
.add-form-toggle{
display:flex;align-items:center;gap:8px;
font-size:11px;font-weight:700;color:var(–muted2);
cursor:pointer;padding:2px 0;letter-spacing:0.5px;
user-select:none;
}
.add-form-toggle svg{width:14px;height:14px;transition:transform 0.2s}
.add-form-toggle.open svg{transform:rotate(180deg)}
.add-form-fields{
display:flex;flex-wrap:wrap;gap:8px;
margin-top:10px;
}
.form-field{display:flex;flex-direction:column;gap:4px;min-width:110px;flex:1}
.form-field label{font-size:9px;font-weight:700;color:var(–muted);letter-spacing:1px;text-transform:uppercase}
.form-field input,.form-field select{
background:var(–card);border:1px solid var(–border2);
border-radius:7px;color:var(–text);padding:7px 10px;
font-size:12.5px;outline:none;font-family:var(–font);
transition:border-color 0.15s;
}
.form-field input:focus,.form-field select:focus{border-color:rgba(201,168,76,0.4)}
.form-field select option{background:var(–card)}
.form-add-btn{
align-self:flex-end;background:var(–gold);border:none;
border-radius:8px;color:#1A1000;font-size:12px;font-weight:800;
cursor:pointer;padding:8px 18px;font-family:var(–font);
white-space:nowrap;height:36px;transition:opacity 0.13s;
}
.form-add-btn:hover{opacity:0.88}

/* Empty state */
.empty-state{
flex:1;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:10px;
}
.empty-icon{opacity:0.12;font-size:48px}
.empty-text{color:var(–muted2);font-size:13px}

/* Status tags */
.tag{
display:inline-block;padding:2px 8px;
border-radius:6px;font-size:10px;font-weight:700;
}
.tag-gold{background:rgba(201,168,76,0.15);color:var(–gold)}
.tag-green{background:rgba(74,184,122,0.15);color:var(–green)}
.tag-red{background:rgba(208,80,80,0.15);color:var(–red)}
.tag-blue{background:rgba(74,140,208,0.15);color:var(–blue)}

/* Finance overview */
.fin-overview{
margin:16px 24px 0;
background:linear-gradient(135deg,#131C2C,#1A2438);
border:1px solid rgba(201,168,76,0.18);
border-radius:16px;padding:18px 20px;flex-shrink:0;
}
.fin-ov-label{font-size:9px;font-weight:800;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:4px}
.fin-ov-balance{font-size:28px;font-weight:800;color:var(–gold);letter-spacing:1px;margin-bottom:14px}
.fin-ov-row{display:flex;gap:0}
.fin-ov-stat{flex:1;padding:0 14px;border-right:1px solid rgba(255,255,255,0.07)}
.fin-ov-stat:first-child{padding-left:0}
.fin-ov-stat:last-child{border-right:none}
.fin-ov-stat-l{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-bottom:4px;font-weight:700}
.fin-ov-stat-v{font-size:14px;font-weight:800}

/* Timeline for log */
.timeline{padding:0 24px 20px;overflow-y:auto;flex:1}
.timeline::-webkit-scrollbar{width:4px}
.timeline::-webkit-scrollbar-thumb{background:var(–border2);border-radius:2px}
.tl-item{display:flex;gap:14px;margin-bottom:18px;position:relative}
.tl-item::before{
content:’’;position:absolute;left:11px;top:24px;bottom:-18px;
width:1.5px;background:linear-gradient(to bottom,var(–border2),transparent);
}
.tl-item:last-child::before{display:none}
.tl-dot{
width:24px;height:24px;border-radius:50%;flex-shrink:0;margin-top:12px;
background:var(–card2);border:2px solid var(–gold);
display:flex;align-items:center;justify-content:center;
}
.tl-dot svg{width:10px;height:10px;color:var(–gold)}
.tl-card{
flex:1;background:var(–card);border:1px solid var(–border);
border-radius:12px;overflow:hidden;
}
.tl-head{
display:flex;justify-content:space-between;align-items:center;
padding:9px 13px;
background:linear-gradient(135deg,#131C2C,#1A2438);
border-bottom:1px solid var(–border);
}
.tl-date{font-size:11px;font-weight:800;color:var(–gold);letter-spacing:1px}
.tl-site{font-size:11px;color:rgba(255,255,255,0.45);display:flex;align-items:center;gap:4px}
.tl-site svg{width:10px;height:10px}
.tl-body{padding:11px 13px}
.tl-work{font-size:13px;font-weight:700;color:var(–text);margin-bottom:5px;line-height:1.4}
.tl-note{font-size:12px;color:var(–muted2);line-height:1.6}
.tl-footer{
display:flex;gap:7px;padding:8px 13px;flex-wrap:wrap;
border-top:1px solid var(–border);background:rgba(0,0,0,0.15);
align-items:center;
}
.tl-tag{
display:inline-flex;align-items:center;gap:4px;
font-size:10px;font-weight:600;color:var(–muted2);
background:var(–card2);border-radius:6px;padding:3px 8px;
}
.tl-tag svg{width:10px;height:10px}
.tl-del{
background:none;border:none;color:var(–muted);
cursor:pointer;font-size:13px;margin-left:auto;padding:0 2px;
transition:color 0.13s;
}
.tl-del:hover{color:var(–red)}

/* ── API Key Modal ── */
#key-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.key-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(3px)}
.key-box{
position:relative;z-index:1;
background:#161E2C;border:1px solid #C9A84C55;border-radius:16px;
padding:24px;width:100%;max-width:340px;
}
.key-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:#C9A84C;margin-bottom:10px}
.key-desc{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.7;margin-bottom:16px}
.key-desc b{color:rgba(255,255,255,0.7)}
.key-input{
width:100%;box-sizing:border-box;
background:#0D1117;border:1px solid #2A3A50;border-radius:8px;
color:#E8EDF5;font-size:13px;padding:11px 12px;font-family:monospace;
outline:none;margin-bottom:14px;
}
.key-input:focus{border-color:#C9A84C55}
.key-row{display:flex;gap:10px}
.key-cancel{flex:1;background:transparent;border:1px solid #2A3A50;border-radius:8px;color:#4A5E78;padding:10px;cursor:pointer;font-size:13px;font-family:inherit}
.key-save{flex:2;background:#C9A84C;border:none;border-radius:8px;color:#000;padding:10px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit}
.key-save:hover{background:#e0ba5c}
.key-ok{margin-top:10px;font-size:11px;color:#4AB87A;text-align:center}

1. 判斷屬於哪個模組

模組與欄位：
attendance: {"date":"YYYY-MM-DD","project":"案場","workers":["人員"],"time_start":"HH:MM","time_end":"HH:MM","hours":"工數","work_content":"工作內容"}
dimension:  {"project":"案場","location":"位置","length":"長cm","width":"寬cm","height":"高cm","depth":"深cm","note":"備註"}

tool:       {"project":"案場","tool_name":"工具名稱","quantity":"數量","status":"帶出/歸還/備用/維修","purpose":"備註","date":"YYYY-MM-DD"}
project:    {"project_name":"案場名稱","address":"地址","client":"業主","start_date":"YYYY-MM-DD","end_date":"YYYY-MM-DD","status":"進行中/收尾/已完工/暫停","note":"備註"}
diary:      {"date":"YYYY-MM-DD","project":"案場","weather":"晴/陰/雨","workers":["人員"],"work":"施工項目","progress":"進度","note":"備註"}
finance:    {"date":"YYYY-MM-DD","project":"案場","type":"收入/支出","item":"項目","amount":"金額數字","note":"備註"}

規則：今天=${TODAY}，自動計算工時，多人員拆成陣列，尺寸預設cm，未確定欄位填null`;

async function callAI(text, imageParts=[]) {
  if (!API_KEY) {
    showKeyModal();
    throw new Error('請先設定 API Key');
  }
  const parts = [...imageParts, {type:'text', text}];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:AI_SYSTEM,
      messages:[{role:'user',content:parts}],
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  const raw = data.content?.find(b=>b.type==='text')?.text || '';
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

function showKeyModal() {
  if (document.getElementById('key-modal')) return;
  const current = API_KEY;
  const el = document.createElement('div');
  el.id = 'key-modal';
  const statusHtml = current
    ? '<div class="key-ok">✓ 已設定 API Key</div>'
    : '<div class="key-warn">⚠ 尚未設定，AI 功能無法使用</div>';
  el.innerHTML = [
    '<div class="key-overlay" onclick="closeKeyModal()"></div>',
    '<div class="key-box">',
    '  <div class="key-title">設定 API Key</div>',
    '  <div class="key-desc">前往 <b>console.anthropic.com</b> 取得 API Key，貼入下方啟用 AI。</div>',
    '  <input class="key-input" id="key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off"/>',
    '  <div class="key-row">',
    '    <button class="key-cancel" onclick="closeKeyModal()">取消</button>',
    '    <button class="key-save" onclick="saveApiKey()">儲存啟用</button>',
    '  </div>',
    statusHtml,
    '</div>'
  ].join('');
  el.querySelector('#key-input').value = current || '';
  document.body.appendChild(el);
  setTimeout(function(){ var i = document.getElementById('key-input'); if(i) i.focus(); }, 100);
}
function closeKeyModal() {
  document.getElementById('key-modal')?.remove();
}
function saveApiKey() {
  const val = document.getElementById('key-input')?.value.trim();
  if (!val || !val.startsWith('sk-')) {
    alert('請輸入正確的 API Key（以 sk- 開頭）');
    return;
  }
  API_KEY = val;
  localStorage.setItem('sk_apikey', val);
  closeKeyModal();
  updateKeyStatus();
  // 顯示成功提示
  const toast = document.createElement('div');
  toast.className = 'toast-ok';

function renderMessages() {
return messages.map((m,i) => {

if(!isUser) html += `<div class="avatar">AI</div>`;
html += `<div style="display:flex;flex-direction:column;gap:8px;max-width:72%">`;
if(m.attachments?.length) {
html += `<div style="display:flex;gap:6px;flex-wrap:wrap">`;

});
html += `</div>`;
}

}).join(’’) + `<div id="msg-bottom"></div>`;

function renderParsedCard(parsed) {
const mod = MODS[parsed.module];
const schema = SCHEMA[parsed.module];
if(!mod||!schema) return ‘’;
let rows = schema.map(col => {
const v = parsed.data?.[col.key];
if(v==null||v===’’) return ‘’;
const disp = col.render ? col.render(v) : (Array.isArray(v)?v.join(’、’):v);
return `<tr><td>${col.label}</td><td>${disp}</td></tr>`;
}).filter(Boolean).join(’’);
return `<div class="parsed-card" style="border-left-color:${mod.color}">

<span class="parsed-tag" style="background:${mod.color}20;color:${mod.color};border:1px solid ${mod.color}40">${mod.label}</span>

<div class="parsed-saved">
<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
已儲存至「${mod.label}」

function setupChat() {
const input = document.getElementById(‘chat-input’);
const fileInput = document.getElementById(‘file-input’);
if (!input || !fileInput) return;
input.addEventListener(‘keydown’, e => {
if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();sendChat();}
});
fileInput.addEventListener(‘change’, e => {
Array.from(e.target.files).forEach(file => {
const reader = new FileReader();
reader.onload = ev => {
attachments.push({
name:file.name, type:file.type,
url:ev.target.result,
base64:ev.target.result.split(’,’)[1],
isImage:file.type.startsWith(‘image/’),
});
renderAttachStrip();
};
reader.readAsDataURL(file);
});
e.target.value=’’;
});
scrollToBottom();
}

function renderAttachStrip() {
const strip = document.getElementById(‘attach-strip’);
if(!strip) return;
strip.innerHTML = attachments.map((a,i) => `<div class="attach-wrap"> ${a.isImage ?`<img src="${a.url}" class="attach-thumb">`:`<div class="attach-file">📄 ${a.name}</div>`} <button class="attach-x" onclick="removeAttach(${i})">✕</button> </div> `).join(’’);
}

function removeAttach(i) { attachments.splice(i,1); renderAttachStrip(); }

let chatLoading = false;
async function sendChat() {
const input = document.getElementById(‘chat-input’);
const msg = input?.value.trim() || ‘’;
if((!msg && attachments.length===0)||chatLoading) return;
const snap = […attachments];
attachments = [];
input.value = ‘’;
renderAttachStrip();
messages.push({role:‘user’,text:msg||’（已附上圖片）’,parsed:null,attachments:snap});
chatLoading = true;
refreshMessages();
addLoadingBubble();
try {
const imgParts = snap.filter(a=>a.isImage).map(a=>({
type:‘image’, source:{type:‘base64’,media_type:a.type,data:a.base64}
}));
const parsed = await callAI(msg||‘請分析這張工程現場照片’, imgParts);
DB[parsed.module].unshift({…parsed.data, _id:Date.now()});
saveDB(parsed.module);
messages.push({role:‘assistant’,text:parsed.summary,parsed,attachments:[]});
} catch(err) {
messages.push({role:‘assistant’,text:‘解析失敗，請再試一次或描述得更清楚。’,parsed:null,attachments:[]});
}
chatLoading = false;
updateBadges();
refreshMessages();
scrollToBottom();
}

function refreshMessages() {
const el = document.getElementById(‘msgs’);
if(el) el.innerHTML = renderMessages();
scrollToBottom();
}

function addLoadingBubble() {
const el = document.getElementById(‘msgs’);
if(!el) return;
el.innerHTML += `<div class="msg-row" id="loading-bubble">
<div class="avatar">AI</div>
<div class="bubble ai"><div class="typing-dots"><span></span><span></span><span></span></div></div>

  </div>`;
  scrollToBottom();
}

function scrollToBottom() {
const el = document.getElementById(‘msg-bottom’);
el?.scrollIntoView({behavior:‘smooth’});
}

function manualAdd(mod) {
const fields = FORM_FIELDS[mod];
const item = {_id:Date.now()};
fields.forEach(f => {

if(!el) return;
let v = el.value.trim();
if(f.key===‘workers’&&v) v = v.split(/[、,，\s]+/).filter(Boolean);
item[f.key] = v || null;
});

saveDB(mod);
switchModule(mod);

function delRecord(mod, idx) {

const schema = SCHEMA[mod];
const filtered = DB[mod].filter(row =>
!q || Object.values(row).some(v=>String(v).toLowerCase().includes(q.toLowerCase()))
);
tbody.innerHTML = filtered.map((row,i) =>
`<tr>${schema.map(col=>{ const v = row[col.key]; const disp = col.render ? col.render(v) : (v??'—'); return `<td>${Array.isArray(v)?v.join(’、’):disp}</td>`; }).join('')}<td class="del-cell"><button class="del-row-btn" onclick="delRecord('${mod}',${DB[mod].indexOf(row)})">✕</button></td></tr>`
).join(’’);

async function dataAIParse(mod) {
const input = document.getElementById(‘data-ai-input’);
const btn = document.getElementById(‘data-ai-btn’);
const text = input?.value.trim();
if(!text) return;
btn.textContent = ‘解析中…’;
btn.disabled = true;
try {
const parsed = await callAI(text);
const targetMod = parsed.module || mod;
DB[targetMod].unshift({…parsed.data, _id:Date.now()});
saveDB(targetMod);
input.value = ‘’;
if(targetMod !== mod) {
alert(`✅ 已解析並儲存至「${MODS[targetMod].label}」`);
switchModule(targetMod);
} else {
switchModule(mod);
}
} catch(e) {
alert(‘解析失敗，請重試’);
}
if(btn) { btn.textContent = ‘AI 解析新增’; btn.disabled = false; }
}

// 更新 active 狀態時同步更新 icon-box 顏色
function updateIconBoxes() {
Object.entries(NAV_ICON_MAP).forEach(([mod, cfg]) => {
const box = document.getElementById(‘iconbox-’ + mod);
if (!box) return;
const isActive = document.getElementById(‘nav-’+mod)?.classList.contains(‘active’);
if (isActive) {
box.style.background = cfg.color;
box.style.border = `1.5px solid ${cfg.color}`;
box.style.boxShadow = `0 0 10px ${cfg.color}60`;
} else {
box.style.background = cfg.color + ‘35’;
box.style.border = `1.5px solid ${cfg.color}60`;
box.style.boxShadow = ‘’;
}
});
}

// 更新 API Key 狀態指示
function updateKeyStatus() {
const dot = document.getElementById(‘key-dot’);
const label = document.getElementById(‘key-label’);
if (!dot) return;
if (API_KEY) {
dot.style.background = ‘#4AB87A’;
if (label) label.textContent = ‘AI 已就緒’;
} else {
dot.style.background = ‘#C9A84C’;
if (label) label.textContent = ‘設定 API Key’;
}
}

// 確保 DOM 完全載入後再初始化
window.addEventListener(‘DOMContentLoaded’, function() {
try {
// 注入圖示
Object.entries(NAV_ICON_MAP).forEach(([mod, cfg]) => {
const el = document.getElementById(‘navicon-’ + mod);
if (!el) return;
el.innerHTML = ‘<div class="nav-icon-box" id="iconbox-' + mod + '" style="background:' + cfg.color + '35;border:1.5px solid ' + cfg.color + '60" data-color="' + cfg.color + '"></div>’;
});
updateBadges();
renderContent();
updateIconBoxes();
updateKeyStatus();
} catch(e) {

}
});
